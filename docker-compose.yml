services:
  neo4j:
    image: neo4j:5.18-community
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - re-lore-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 40s

  qdrant:
    image: qdrant/qdrant:v1.11.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - re-lore-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  clip-service:
    build:
      context: ./runtime/clip-service
      dockerfile: Dockerfile
      args:
        TORCH_DEVICE: ${TORCH_DEVICE:-auto}
    # Pre-built image from GHCR (used when available, skips local build).
    # Pull with: docker pull ghcr.io/mhamdashfaque/re-lore-base:latest
    image: ghcr.io/mhamdashfaque/re-lore-clip-service:latest
    ports:
      - "8001:8001"
    environment:
      CLIP_MODEL: "${CLIP_MODEL:-ViT-B-32}"
      CLIP_PRETRAINED: "${CLIP_PRETRAINED:-openai}"
    networks:
      - re-lore-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 360s

  api:
    build:
      context: ./runtime/api
      dockerfile: Dockerfile
      args:
        TORCH_DEVICE: ${TORCH_DEVICE:-auto}
    # Pre-built image from GHCR (used when available, skips local build).
    # Pull with: docker pull ghcr.io/mhamdashfaque/re-lore-api:latest
    image: ghcr.io/mhamdashfaque/re-lore-api:latest
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      QDRANT_URL: "http://qdrant:6333"
      CLIP_SERVICE_URL: "http://clip-service:8001"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      GROQ_MODEL: "${GROQ_MODEL:-llama-3.3-70b-versatile}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      clip-service:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
    networks:
      - re-lore-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./runtime/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://api:8000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - re-lore-net

volumes:
  neo4j_data:
  qdrant_data:

networks:
  re-lore-net:
    driver: bridge
